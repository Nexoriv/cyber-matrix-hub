<!DOCTYPE html>
<html>
<head>
<title>Cyber Tools</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>

<style>

/* BACKGROUND */
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

nav h2{
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
opacity:0.8;
}

nav a:hover{
opacity:1;
}

/* HERO */
header{
text-align:center;
padding:40px 20px 10px;
}

header h1{
font-size:42px;
margin:0;
}

header span{
color:#60a5fa;
}

header p{
opacity:0.7;
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:40px;
margin:20px 0;
}

.stat{
text-align:center;
}

.stat h3{
margin:0;
color:#60a5fa;
}

/* SWIPER */
.swiper{
height:70vh;
display:flex;
align-items:center;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
border-radius:18px;
padding:20px;
width:260px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

/* ICON */
.icon{
font-size:28px;
margin-bottom:10px;
}

/* INPUT */
input, textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

ul{
text-align:left;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<h2>⚡ Cyber Tools</h2>
<div>
<a href="#">Home</a>
<a href="#">Tools</a>
<a href="#">About</a>
</div>
</nav>

<!-- HERO -->
<header>
<h1>Powerful <span>Digital Tools</span> in One Place</h1>
<p>Simple, fast and useful tools for your daily work</p>
</header>

<!-- STATS -->
<div class="stats">
<div class="stat">
<h3>10+</h3>
<p>Tools</p>
</div>

<div class="stat">
<h3>100%</h3>
<p>Free</p>
</div>

<div class="stat">
<h3>Fast</h3>
<p>Performance</p>
</div>
</div>

<!-- SLIDER -->
<div class="swiper mySwiper">
<div class="swiper-wrapper">

<div class="swiper-slide card">
<div class="icon">🔐</div>
<h3>Password Generator</h3>
<p id="pass">Click generate</p>
<button onclick="genPass()">Generate</button>
</div>

<div class="swiper-slide card">
<div class="icon">📧</div>
<h3>Temporary Email</h3>
<button onclick="window.open('https://temp-mail.org')">Open Tool</button>
</div>

<div class="swiper-slide card">
<div class="icon">🧑</div>
<h3>Fake Identity</h3>
<button onclick="window.open('https://www.fakenamegenerator.com')">Open Tool</button>
</div>

<div class="swiper-slide card">
<div class="icon">🔳</div>
<h3>QR Generator</h3>
<input id="qrText" placeholder="Enter text">
<button onclick="makeQR()">Generate</button>
<img id="qrImg" width="120">
</div>

<div class="swiper-slide card">
<div class="icon">📝</div>
<h3>Quick Notes</h3>
<textarea id="note"></textarea>
<button onclick="saveNote()">Save</button>
<button onclick="loadNote()">Load</button>
</div>

<div class="swiper-slide card">
<div class="icon">✅</div>
<h3>To-Do List</h3>
<input id="task">
<button onclick="addTask()">Add</button>
<ul id="list"></ul>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.js"></script>

<script>

new Swiper(".mySwiper", {
effect:"coverflow",
grabCursor:true,
centeredSlides:true,
slidesPerView:"auto",
loop:false,

coverflowEffect:{
rotate:12,
depth:100,
modifier:1,
slideShadows:false,
},
});

/* PASSWORD */
function genPass(){
let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*";
let pass="";
for(let i=0;i<12;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
document.getElementById("pass").innerText=pass;
}

/* QR */
function makeQR(){
let text=document.getElementById("qrText").value;
if(!text) return alert("Enter text");
document.getElementById("qrImg").src=
"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+encodeURIComponent(text);
}

/* NOTES */
function saveNote(){
localStorage.setItem("note",document.getElementById("note").value);
}
function loadNote(){
document.getElementById("note").value=localStorage.getItem("note")||"";
}

/* TODO */
function addTask(){
let t=document.getElementById("task").value;
if(!t) return;

let li=document.createElement("li");
li.innerText=t;
li.onclick=()=>li.remove();

document.getElementById("list").appendChild(li);
document.getElementById("task").value="";
}

</script>

</body>
</html>
